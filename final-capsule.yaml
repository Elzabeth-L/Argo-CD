apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: final-capsule
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Elzabeth-L/Final-capsule.git
    targetRevision: main
    path: final-capsule
  destination: 
    server: https://kubernetes.default.svc
    namespace: final-capsule
  syncPolicy:
    authomated:
      prune: true
      selfHeal: true
    syncOptions:
      - createNamespace=true
